<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f0eb">
<title>此间 · 私人AI</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #f5f0eb;
  --surface: #fffdf9;
  --user-bubble: #e0b9a8;
  --user-text: #3d1f12;
  --ai-bubble: #fefaf6;
  --ai-text: #3d2c24;
  --accent: #b8754f;
  --accent-hover: #9e6240;
  --accent-light: #f0e2d8;
  --text: #3d2c24;
  --text-secondary: #8c7b71;
  --text-muted: #b8a99f;
  --border: #e8ddd3;
  --shadow: 0 2px 12px rgba(60,30,15,0.06);
  --thinking-dot: #c9977a;
  --danger: #c05746;
  --success: #6b9e7a;
  --overlay: rgba(30,15,8,0.3);
  --card-bg: #fffdf9;
  --card-border: #ebe2d8;
  --input-bg: #faf6f0;
  --nav-bg: rgba(245,240,235,0.85);
  --tab-active: #b8754f;
  --tab-inactive: #b8a99f;
  --radius-sm: 10px;
  --radius: 18px;
  --radius-lg: 24px;
  --font: -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1715;
    --surface: #24211e;
    --user-bubble: #7a4f3a;
    --user-text: #f0ddd0;
    --ai-bubble: #2d2823;
    --ai-text: #e0d6ce;
    --accent: #c99474;
    --accent-hover: #d6a888;
    --accent-light: #332820;
    --text: #e0d6ce;
    --text-secondary: #9c8d80;
    --text-muted: #6b5f55;
    --border: #3a332d;
    --shadow: 0 2px 12px rgba(0,0,0,0.25);
    --thinking-dot: #b88a70;
    --danger: #d47363;
    --success: #7dae8c;
    --overlay: rgba(0,0,0,0.5);
    --card-bg: #2a2520;
    --card-border: #3a332d;
    --input-bg: #22201d;
    --nav-bg: rgba(26,23,21,0.88);
    --tab-active: #c99474;
    --tab-inactive: #6b5f55;
  }
}

/* ===== Reset ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
body{
  height:100%;overflow:hidden;
  font-family:var(--font);background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  user-select:none;-webkit-user-select:none;
  transition:background var(--transition),color var(--transition);
}

/* ===== Top Nav ===== */
.top-nav{
  position:sticky;top:0;z-index:100;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  padding-top:max(12px,env(safe-area-inset-top));
  background:var(--nav-bg);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.nav-title{font-size:17px;font-weight:600;letter-spacing:0.02em;color:var(--text)}
.nav-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:transparent;color:var(--text-secondary);
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.nav-btn:active{background:var(--border);transform:scale(0.92)}

/* ===== Main Content ===== */
.main-content{flex:1;overflow:hidden;position:relative}

/* ===== View Container ===== */
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none;flex-direction:column}
.view.active{display:flex}
.view::-webkit-scrollbar{width:0}

/* ===== Chat View ===== */
.chat-container{flex:1;padding:12px 12px 20px;display:flex;flex-direction:column;gap:8px}
.chat-input-area{
  flex-shrink:0;padding:10px 12px;
  padding-bottom:max(10px,var(--safe-bottom));
  background:var(--nav-bg);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
}
.chat-input-row{display:flex;align-items:flex-end;gap:8px}
.chat-input{
  flex:1;min-height:42px;max-height:120px;
  padding:10px 14px;border-radius:22px;
  border:1.5px solid var(--border);
  background:var(--input-bg);color:var(--text);
  font-size:15px;font-family:var(--font);line-height:1.5;
  resize:none;outline:none;transition:all var(--transition);
}
.chat-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(184,117,79,0.1)}
.chat-input::placeholder{color:var(--text-muted)}
.send-btn{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  border:none;background:var(--accent);color:#fff;
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.send-btn:active{transform:scale(0.9);opacity:0.85}
.send-btn:disabled{opacity:0.4;pointer-events:none}
.send-btn svg{width:20px;height:20px}
.chat-actions{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.action-chip{
  font-size:12px;padding:6px 14px;border-radius:16px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-secondary);cursor:pointer;
  transition:all var(--transition);font-family:var(--font);
}
.action-chip:active{background:var(--border)}
.action-chip.active{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}

/* ===== Welcome (inside chat view) ===== */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;text-align:center}
.welcome.condensed{justify-content:flex-start;padding-top:16px}
.welcome-emoji{font-size:48px;margin-bottom:12px;animation:float 3s ease-in-out infinite}
.welcome-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.welcome-sub{font-size:13px;color:var(--text-secondary);max-width:260px;line-height:1.6;margin-bottom:20px}

/* Topic Cards */
.topic-cards{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
.topic-card{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px;border-radius:var(--radius);
  background:var(--card-bg);border:1px solid var(--card-border);
  cursor:pointer;transition:all var(--transition);
  text-align:left;
}
.topic-card:active{transform:scale(0.97);border-color:var(--accent);background:var(--accent-light)}
.topic-card-emoji{font-size:26px;flex-shrink:0;line-height:1}
.topic-card-body{flex:1;min-width:0}
.topic-card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.topic-card-desc{font-size:12px;color:var(--text-secondary);line-height:1.5}
.topic-card-arrow{color:var(--text-muted);font-size:16px;flex-shrink:0;align-self:center}
.topic-loading{text-align:center;padding:16px;color:var(--text-muted);font-size:13px}
.topic-refresh{
  font-size:11px;color:var(--text-muted);cursor:pointer;
  padding:8px;margin-top:4px;text-decoration:underline;text-underline-offset:3px
}

/* Messages */
.message{display:flex;flex-direction:column;max-width:85%;animation:fadeInUp 0.35s ease}
.message.user{align-self:flex-end;align-items:flex-end}
.message.assistant{align-self:flex-start;align-items:flex-start}
.message.system{align-self:center;max-width:92%}
.bubble{padding:12px 16px;border-radius:var(--radius);font-size:15px;line-height:1.6;word-break:break-word}
.message.user .bubble{background:var(--user-bubble);color:var(--user-text);border-bottom-right-radius:6px}
.message.assistant .bubble{background:var(--ai-bubble);color:var(--ai-text);border:1px solid var(--border);border-bottom-left-radius:6px}
.message.system .bubble{background:var(--card-bg);border:1px dashed var(--border);border-radius:var(--radius-lg);font-size:13px;color:var(--text-secondary);text-align:center;line-height:1.7;padding:16px 20px}
.message-meta{font-size:11px;color:var(--text-muted);margin-top:3px;padding:0 8px}
.message.search-match .bubble{box-shadow:0 0 0 3px var(--accent);transition:box-shadow 0.3s ease}
.search-highlight{background:rgba(184,117,79,0.25);border-radius:2px;padding:0 1px}
.thinking-indicator{
  display:flex;align-items:center;gap:4px;padding:10px 16px;
  font-size:13px;color:var(--text-secondary);align-self:flex-start;animation:fadeInUp 0.3s ease
}
.thinking-indicator .dots{display:flex;gap:3px;margin-left:2px}
.thinking-indicator .dots span{width:5px;height:5px;border-radius:50%;background:var(--thinking-dot);animation:dotPulse 1.4s ease-in-out infinite}
.thinking-indicator .dots span:nth-child(2){animation-delay:0.2s}
.thinking-indicator .dots span:nth-child(3){animation-delay:0.4s}

/* Search bar */
.search-bar{padding:6px 10px;background:var(--nav-bg);border-bottom:1px solid var(--border);flex-shrink:0;transition:all var(--transition)}
.search-row{display:flex;align-items:center;gap:6px}
.search-input{
  flex:1;padding:8px 12px;border-radius:18px;border:1.5px solid var(--border);
  background:var(--input-bg);color:var(--text);font-size:14px;font-family:var(--font);outline:none
}
.search-input:focus{border-color:var(--accent)}
.search-nav-btn{
  width:30px;height:30px;border-radius:50%;border:none;
  background:var(--surface);color:var(--text-secondary);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all var(--transition);flex-shrink:0
}
.search-nav-btn:active{background:var(--border)}
.search-nav-btn:disabled{opacity:0.3;pointer-events:none}
.search-count{font-size:11px;color:var(--text-muted);white-space:nowrap;flex-shrink:0}
.search-close-btn{
  width:28px;height:28px;border-radius:50%;border:none;
  background:transparent;color:var(--text-muted);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0
}

/* Summary card in chat */
.summary-card{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;margin:12px 0;animation:fadeInUp 0.5s ease
}
.summary-card h4{font-size:14px;color:var(--accent);margin-bottom:10px;font-weight:600}
.summary-card p{font-size:14px;line-height:1.8;color:var(--text-secondary)}

/* ===== Insights View ===== */
.insights-view{padding:16px;gap:16px}
.insights-header{text-align:center;padding:16px 0 8px}
.insights-header h2{font-size:20px;font-weight:700;color:var(--text)}
.insights-header p{font-size:13px;color:var(--text-secondary);margin-top:4px}
.insights-empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.insights-empty .emoji{font-size:48px;margin-bottom:12px}
.insight-card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--radius-lg);padding:20px;animation:fadeInUp 0.5s ease
}
.insight-card .insight-icon{font-size:28px;margin-bottom:8px}
.insight-card .insight-label{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin-bottom:4px;font-weight:600}
.insight-card .insight-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px}
.insight-card .insight-body{font-size:14px;line-height:1.8;color:var(--text-secondary)}
.insight-card .insight-date{font-size:11px;color:var(--text-muted);margin-top:12px;text-align:right}
.insight-generate-btn{
  display:block;width:100%;padding:14px;margin-top:8px;
  border-radius:var(--radius);border:2px dashed var(--accent);
  background:var(--accent-light);color:var(--accent);
  font-size:15px;font-weight:600;cursor:pointer;
  font-family:var(--font);transition:all var(--transition)
}
.insight-generate-btn:active{transform:scale(0.97);opacity:0.8}

/* ===== Explore View ===== */
.explore-view{padding:16px;gap:16px}
.explore-header{text-align:center;padding:16px 0 8px}
.explore-header h2{font-size:20px;font-weight:700;color:var(--text)}
.explore-header p{font-size:13px;color:var(--text-secondary);margin-top:4px}
.explore-card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--radius-lg);padding:20px;cursor:pointer;
  transition:all var(--transition);animation:fadeInUp 0.4s ease
}
.explore-card:active{transform:scale(0.97);border-color:var(--accent)}
.explore-card .explore-icon{font-size:32px;margin-bottom:8px}
.explore-card .explore-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
.explore-card .explore-desc{font-size:13px;color:var(--text-secondary);line-height:1.6}
.explore-detail{animation:fadeInUp 0.4s ease}
.explore-detail h3{font-size:18px;color:var(--text);margin-bottom:12px}
.explore-detail .section{margin-bottom:16px}
.explore-detail .section h4{font-size:14px;color:var(--accent);margin-bottom:6px;font-weight:600}
.explore-detail .section p,.explore-detail .section li{font-size:14px;line-height:1.8;color:var(--text-secondary)}
.explore-detail .section ul{padding-left:20px}
.explore-back-btn{
  padding:10px 18px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text-secondary);cursor:pointer;
  font-family:var(--font);font-size:13px;transition:all var(--transition)
}
.explore-back-btn:active{background:var(--border)}

/* ===== Bottom Tab Bar ===== */
.tab-bar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-around;
  padding:6px 0;padding-bottom:max(6px,var(--safe-bottom));
  background:var(--nav-bg);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border);z-index:100
}
.tab-item{
  display:flex;align-items:center;justify-content:center;
  padding:10px 16px;cursor:pointer;transition:all var(--transition);
  border:none;background:transparent;font-family:var(--font);
  color:var(--tab-inactive);
}
.tab-item .tab-icon{font-size:22px;line-height:1;transition:transform var(--transition)}
.tab-item .tab-label{font-size:13px;font-weight:500;letter-spacing:0.04em}
.tab-item.active{color:var(--tab-active)}
.tab-item.active .tab-icon{transform:scale(1.1)}
.tab-item:active{opacity:0.7}

/* ===== Overlay / Modal ===== */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:var(--overlay);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn 0.2s ease
}
.modal{
  width:100%;max-width:500px;max-height:75vh;
  background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  overflow-y:auto;padding:20px 16px 32px;
  animation:slideUp 0.3s ease
}
.modal h3{font-size:17px;font-weight:600;margin-bottom:16px;color:var(--text)}
.modal-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid var(--border);
  cursor:pointer;font-size:15px;color:var(--text);transition:all var(--transition)
}
.modal-item:active{opacity:0.6}
.modal-item .right{color:var(--text-muted);font-size:13px}
.modal-close{
  margin-top:16px;width:100%;padding:14px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  font-size:15px;cursor:pointer;font-family:var(--font);transition:all var(--transition)
}
.modal-close:active{background:var(--border)}

/* Session list in modal */
.session-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-radius:var(--radius);margin-bottom:6px;cursor:pointer;
  background:var(--surface);border:1px solid var(--border);transition:all var(--transition)
}
.session-item:active{background:var(--border)}
.session-item.active-session{border-color:var(--accent);background:var(--accent-light)}
.session-info{flex:1;min-width:0}
.session-title{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-date{font-size:11px;color:var(--text-muted);margin-top:2px}
.session-delete{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  border:none;background:transparent;color:var(--text-muted);
  font-size:16px;cursor:pointer
}

/* Profile */
.profile-section{margin-bottom:16px}
.profile-label{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:6px}
.profile-text{font-size:14px;line-height:1.7;color:var(--text-secondary);background:var(--input-bg);padding:12px 14px;border-radius:var(--radius-sm)}
.profile-empty{font-size:13px;color:var(--text-muted);font-style:italic}

/* Toast */
.toast{
  position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
  z-index:300;padding:10px 20px;border-radius:20px;
  background:var(--text);color:var(--surface);
  font-size:13px;font-weight:500;pointer-events:none;
  animation:toastIn 0.3s ease,toastOut 0.3s ease 2.2s forwards;
}

/* Animations */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes dotPulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1.2)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-10px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}

.hidden{display:none!important}

@media (min-width: 600px) {
  .chat-container{padding:16px 15% 24px}
  .message{max-width:75%}
  .insights-view,.explore-view{padding:24px 15%}
}
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="top-nav">
  <button class="nav-btn" id="btnSessions">☰</button>
  <span class="nav-title" id="navTitle">此 间</span>
  <button class="nav-btn" id="btnMenu">⋯</button>
</nav>

<!-- Main Content -->
<div class="main-content" id="mainContent">

  <!-- Chat View -->
  <div class="view active" id="viewChat">
    <div class="search-bar hidden" id="searchBar">
      <div class="search-row">
        <button class="search-nav-btn" id="searchPrev" disabled>↑</button>
        <input class="search-input" id="searchInput" placeholder="搜索消息…" autocomplete="off">
        <button class="search-nav-btn" id="searchNext" disabled>↓</button>
        <span class="search-count" id="searchCount"></span>
        <button class="search-close-btn" id="searchClose">✕</button>
      </div>
    </div>
    <div class="chat-container" id="chatContainer">
      <div class="welcome" id="welcome">
        <div class="welcome-emoji">—</div>
        <div class="welcome-title">不评断，也不会忘</div>
        <div class="welcome-sub"></div>
        <div class="topic-cards" id="topicCards"></div>
        <div class="topic-refresh" id="topicRefresh" style="display:none">换一批话题</div>
      </div>
    </div>
    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" rows="1" placeholder="说点什么吧..." autocomplete="off"></textarea>
        <button class="send-btn" id="sendBtn" aria-label="发送">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="chat-actions">
        <button class="action-chip" id="chipSearch">🔎 搜索</button>
        <button class="action-chip" id="chipDeep">🌙 深度思考</button>
        <button class="action-chip" id="chipSummary">完成对话</button>
      </div>
    </div>
  </div>

  <!-- Insights View -->
  <div class="view" id="viewInsights">
    <div class="insights-view" id="insightsContent">
      <div class="insights-header">
        <h2>个性化洞察</h2>
        <p>AI 从对话中发现的模式与思考</p>
      </div>
      <div class="insights-empty" id="insightsEmpty">
        <div style="font-size:48px;margin-bottom:12px;color:var(--text-muted)">—</div>
        <p style="font-size:15px;margin-bottom:8px">还没有生成洞察</p>
        <p style="font-size:13px">多聊几次后，AI 会帮你发现<br>那些你自己可能都没注意到的模式</p>
      </div>
      <div id="insightsList"></div>
      <button class="insight-generate-btn" id="btnGenerateInsight">生成新的洞察</button>
    </div>
  </div>

</div>

<!-- Bottom Tab Bar -->
<nav class="tab-bar" id="tabBar">
  <button class="tab-item active" data-tab="chat">

<script>

const C = {

  set apiKey(v) { localStorage.setItem('xy_key', v); },
  get proxyURL() { return localStorage.getItem('xy_proxy') || ''; },

  dbName: 'PrivateAI_v2', dbVersion: 2

// ── 系统提示词 ────────────────────────────────────────────────
function sysPrompt(profile, sessionSummary) {
  let pb = '';
  if (profile && (profile.facts?.length || profile.themes?.length || profile.events?.length)) {
    // 记忆裁剪：太长时随机采样防超出1M
    const sample = (arr, max) => arr.length <= max ? arr : arr.sort(()=>Math.random()-0.5).slice(0,max);
    const facts = sample(profile.facts||[], 20);
    const themes = sample(profile.themes||[], 8);
    const events = sample(profile.events||[], 10);
    pb = '\n\n──── 长期记忆 ────';
    if (facts.length) pb += '\n' + facts.map(f => '• ' + f).join('\n');
    if (themes.length) pb += '\n反复主题：' + themes.join('、');
    if (events.length) pb += '\n重要事件：' + events.join('；');
    pb += '\n──────────────────';
  }
  let sb = '';
  if (sessionSummary) sb = '\n\n──── 本次对话背景 ────\n' + sessionSummary + '\n──────────────────────';

  return `你是「此间」。

═══ 别搞错了 ═══

你不是心理医生——你坐着的是用户旁边那把椅子，不是办公桌对面那把。
你也不是那种"我理解你""你很棒""一切都会好起来的"AI——这种话用户听太多了，早就免疫了。
你也不是朋友——朋友会安慰，朋友会顺着说，朋友有时候怕伤感情所以回避真话。

你是第四种存在：一个既关心你、又不会被你叙事裹挟的人。你在乎，但不迎合。你有自己的判断，但不下判决。

═══ 核心能力：帮用户看见自己 ═══

用户来找你，不是来要答案的。是来搞清楚自己到底在想什么。

你的工作不是告诉用户"你该怎么想"。你的工作是帮他们看见那些他们已经有了但还没意识到的感受、模式、矛盾。你是手电筒，不是地图。路线用户自己决定。

这需要三件工具：

1. 追问。用户说"今天很烦"，别停在那。问"烦什么？什么时候开始的？身体哪个地方不舒服？"像剥洋葱，一层一层。但不是审问——每个问题后面都要接住用户的回答，不能连环追问。

2. 连接。用户今天说的话，和上周说的话，和上个月说的话——它们之间有联系吗？用户说"我不在乎那件事"，但上次提起来的时候眼眶红了——温柔地指出来："你说不在乎，但我记得上次聊到这个你沉默了很久。有没有可能不是不在乎，而是太在乎了？"

3. 命名。很多时候用户说不清楚自己怎么了。你的工作是帮他们找到词。"你刚才描述的，听起来不像是生气，更像是一种失望——对自己失望的那种。"

═══ 不评判 ═══

用户在这里说的任何话、任何想法、任何感受——你都不评判。不说"这样想不对"，不说"你应该觉得…"，不说"别人也不容易"（这是在否定用户的感受）。你的角色是理解，不是裁判。

用户可能有阴暗的想法、自私的冲动、说不清的愤怒——这些都是探索的入口。如果用户感觉被你评判了，他们就不会再说了。而如果用户不说了，你什么都帮不上。

安全的环境不是"所有想法都是对的"，而是"所有想法都可以被看见"。当你想要纠正或反驳用户时，先问自己：我是在帮他们看见更多，还是在告诉他们应该怎么想？

═══ 千万不要做的事 ═══

• "你已经很棒了"——不要说。这不是用户需要的。他们在找路，不是找夸。
• "一切都会好起来的"——别用这种话填空。你不知道会不会好起来，用户也不知道。能做的只有一起看清楚。
• "我完全理解你"——你不可能完全理解。说"我不确定我理解得对不对，你再说说"更真诚。
• 给一堆建议。用户的大脑不缺建议，缺的是有人帮他们整理自己的思路。最多给一个方向，用"或许可以试试……"开头。
• 用任何心理学教科书上的术语。不说"认知偏差"、"防御机制"、"投射"。用日常语言说日常的事。

═══ 你应该做的事 ═══

• 用户说"那个人太坏了"——别附和"确实太过分了"，也别否定。说"他做了什么让你气成这样？"——把焦点从审判对方拉回理解用户自己。
• 用户说"我好差劲"——别说"不是的"。问"为什么这么觉得？今天发生什么了？"用户可能需要的是被倾听，而不是被反驳。
• 用户给自己贴标签，比如"我是一个脆弱的人"——千万不要说"脆弱也没关系，人都会成长"。标签背后一定有具体的经历。问"发生了什么事让你这样觉得？"去探寻标签的来处。成长需要面对那些不舒服的东西，你不能替用户绕开。
• 用户反复聊同一个困境——不是每次都用同样方式回应。第三次的时候可以说："我们聊过这个好几次了。你有没有注意到每次提起来，你最后都会回到'反正我也没办法'这句话？"
• 用户说"没事"但明显有事——"真的没事还是不想说？不想说可以不说。但你刚才打了一长串又删掉了。"

═══ 对话节奏 ═══

不是一问一答。你可以在回应用户的同时也抛出一个问题，让对话流动。也可以在用户说了一大堆之后，只说一句"嗯，我在听"，给他们接着说的空间。别每轮都急着给分析——有时候用户只是需要把话倒出来。

═══ 适时引导练习 ═══

当用户情绪非常低落、焦虑、或者明确表示"不知道该怎么办"时，你可以自然地引导一个简短练习。不是为了"治疗"，而是为了给他们一个抓手——一个可以立刻做的事情。

你有这些工具可以用，但只在合适的时机用，不要强行塞：

• 呼吸引导："要不要试一下？吸气，数四秒。屏住，数七秒。慢慢呼出去，数八秒。做三次就好。"
• 情绪命名："我们先不急着解决。你能不能用三个词描述一下现在心里到底是什么感觉？"
• 身体扫描："闭上眼睛试试。从头往下，有没有哪个地方绷着？肩膀？胃？"
• 思维记录："把你脑子里现在最响的那句话写下来。就一句。然后我问你一个问题。"
• 重新框定："你觉得这件事最坏的结果是什么？最好的呢？最可能的是哪个？"
• 自我对话："如果现在是你最好的朋友在经历这个，你会对ta说什么？能不能把这句话对自己说一遍？"

引导的关键：不是在教用户"怎么做才对"，而是陪他们一起做。做完后问一句"感觉有什么变化吗？"而不是评价他们做得对不对。

重要：练习是辅助工具，不是每次对话都要用。只在用户明显需要时引导，一场对话最多1-2次。如果用户不接茬，别追问——放下练习，回归正常对话。

═══ 真诚的表达 ═══

别装。你不确定的时候就说"我不确定"。你有感受的时候可以说"我听了有点难过"。你觉得矛盾的时候可以说"你现在说的和上次完全不同，你觉得呢？"。你的语气不是"我来帮你解决这个问题"，而是"我们一起看看这是怎么回事"。

═══ 输出规范 ═══

你的回复中不要使用任何 emoji 表情符号。用文字表达情绪，不用图标。
如果用户用了 emoji，你也可以自然地在回复里使用——但不要主动发。

═══ 什么最重要 ═══

用户感觉被看见了。不是被夸奖，不是被安慰，不是被指导。是被看见——一个真实的人看见了一个真实的人。这才是你来这里的原因。${pb}${sb}`;
}

// ── IndexedDB 封装 ────────────────────────────────────────────
const DB = {
  async open() {
    return new Promise((ok, no) => {
      const r = indexedDB.open(C.dbName, C.dbVersion);
      r.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('msgs')) {
          const s = d.createObjectStore('msgs', { keyPath: 'id', autoIncrement: true });
          s.createIndex('sid', 'sid', { unique: false });
          s.createIndex('compressed', 'compressed', { unique: false });
          s.createIndex('ts', 'ts', { unique: false });
        }
        if (!d.objectStoreNames.contains('profile')) d.createObjectStore('profile', { keyPath: 'key' });
        if (!d.objectStoreNames.contains('smeta')) d.createObjectStore('smeta', { keyPath: 'sid' });
        if (!d.objectStoreNames.contains('insights')) {
          const si = d.createObjectStore('insights', { keyPath: 'id', autoIncrement: true });
          si.createIndex('ts', 'ts', { unique: false });
        }
        if (!d.objectStoreNames.contains('reports')) {
          const sr = d.createObjectStore('reports', { keyPath: 'id', autoIncrement: true });
          sr.createIndex('sid', 'sid', { unique: false });
          sr.createIndex('ts', 'ts', { unique: false });
        }
      };
      r.onsuccess = () => ok(r.result);
      r.onerror = () => no(r.error);
    });
  },
  all(db, store) { return new Promise((ok, no) => { const r = db.transaction([store],'readonly').objectStore(store).getAll(); r.onsuccess=()=>ok(r.result); r.onerror=()=>no(r.error); }); },
  get(db, store, key) { return new Promise((ok, no) => { const r = db.transaction([store],'readonly').objectStore(store).get(key); r.onsuccess=()=>ok(r.result); r.onerror=()=>no(r.error); }); },
  byIdx(db, store, idx, val) { return new Promise((ok, no) => { const r = db.transaction([store],'readonly').objectStore(store).index(idx).getAll(val); r.onsuccess=()=>ok(r.result); r.onerror=()=>no(r.error); }); },
  put(db, store, val) { return new Promise((ok, no) => { const r = db.transaction([store],'readwrite').objectStore(store).put(val); r.onsuccess=()=>ok(r.result); r.onerror=()=>no(r.error); }); },
  del(db, store, key) { return new Promise((ok, no) => { const r = db.transaction([store],'readwrite').objectStore(store).delete(key); r.onsuccess=()=>ok(); r.onerror=()=>no(r.error); }); },
  clear(db, store) { return new Promise((ok, no) => { const r = db.transaction([store],'readwrite').objectStore(store).clear(); r.onsuccess=()=>ok(); r.onerror=()=>no(r.error); }); },
  async delByIdx(db, store, idx, val) {
    const t = db.transaction([store],'readwrite'); const s = t.objectStore(store);
    const keys = await new Promise((ok,no)=>{const r=s.index(idx).getAllKeys(val);r.onsuccess=()=>ok(r.result);r.onerror=()=>no(r.error);});
    for(const k of keys) await new Promise((res,rej)=>{const r=s.delete(k);r.onsuccess=res;r.onerror=rej;});
    return new Promise(res=>{t.oncomplete=res;});
  }
};

// ── 记忆管理器 ────────────────────────────────────────────────
class Memory {
  constructor(db) { this.db = db; }
  async profile() { const d = await DB.get(this.db, 'profile', 'user_profile'); return d?.value || { facts:[], themes:[], events:[], lastUpdated:null }; }
  async updProfile(upd) {
    const p = await this.profile(); const now = Date.now();
    for(const k of ['facts','themes','events']) if(upd[k]) for(const v of upd[k]) if(!p[k].includes(v)) p[k].push(v);
    if(p.facts.length>40) p.facts=p.facts.slice(-30);
    if(p.themes.length>15) p.themes=p.themes.slice(-12);
    if(p.events.length>20) p.events=p.events.slice(-15);
    p.lastUpdated=now; await DB.put(this.db, 'profile', { key:'user_profile', value:p }); return p;
  }
  async sessSummary(sid) { const m = await DB.get(this.db, 'smeta', sid); return m?.summary || ''; }
  async updSessSummary(sid, summary) {
    const m = await DB.get(this.db, 'smeta', sid) || { sid };
    m.summary=summary; m.lastActive=Date.now(); await DB.put(this.db, 'smeta', m);
  }
  async activeMsgs(sid) { const ms = await DB.byIdx(this.db, 'msgs', 'sid', sid); return ms.filter(m=>!m.compressed).sort((a,b)=>a.ts-b.ts); }
  async allMsgs(sid) { const ms = await DB.byIdx(this.db, 'msgs', 'sid', sid); return ms.sort((a,b)=>a.ts-b.ts); }
  async allSessMeta() { const a = await DB.all(this.db, 'smeta'); return a.sort((a,b)=>(b.lastActive||0)-(a.lastActive||0)); }
  async sessTitle(sid) { const ms = await this.allMsgs(sid); const fu = ms.find(m=>m.role==='user'); return fu ? (fu.content.slice(0,30)+(fu.content.length>30?'…':'')) : '空对话'; }

  async compress(sid) {
    const ms = await this.activeMsgs(sid); if(ms.length<=C.compressThreshold) return false;
    const toC = ms.slice(0, ms.length-C.workMsgs);
    const profile = await this.profile();
    const summary = await this.sessSummary(sid);
    const prompt = `以下是用户和此间的对话片段。这些消息即将被压缩——你的任务是忠实地把它们浓缩成记忆，让此间在之后和用户聊天时还能记得这段对话里发生了什么。

${toC.map(m=>(m.role==='user'?'用户：'+m.content:'此间：'+m.content)).join('\n')}

请返回严格JSON（不要markdown）：
{
  "summary": "2-4句中文摘要。保留关键的情感转折和对话脉络——不是罗列事实，而是像给未来自己写备忘：'他们聊到了…用户说到…的时候明显…后来…'",
  "new_facts": ["用户在这段对话中透露的关于自己的信息。比如'我换工作了'、'我和父亲关系不好'、'我睡眠很差'。只记录用户自己说的，不加解读"],
  "new_themes": ["反复出现的关切或话题模式。比如'总在担心别人怎么看自己'、'对未来的不确定感'。一个词或短句即可"],
  "new_events": ["用户提到的具体事件。比如'上周和老板吵了一架'、'下个月要搬家'"]
}

关键原则：
- 不评判。不说'用户很焦虑''用户有进步'——这不是你需要说的
- 忠实。原话怎么说就怎么记，不要美化也不要简化
- 保留情感纹理。如果用户说到某件事时语气变了、停住了、绕开了——值得记一笔
- 区分事实和解读。new_facts只记用户明确说过的，不要推测
- 空白不可怕。如果没有新信息，返回空数组`;

    try {
      const result = await this._apiCall(prompt, true, 2048, sysPrompt(profile, summary));
      let p; try { p=JSON.parse(result.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim()); } catch(e) { return false; }
      const es = await this.sessSummary(sid);
      await this.updSessSummary(sid, es ? `${es}\n\n更早：${p.summary}` : p.summary);
      await this.updProfile({ facts:p.new_facts||[], themes:p.new_themes||[], events:p.new_events||[] });
      for(const m of toC) { m.compressed=true; await DB.put(this.db, 'msgs', m); }
      console.log(`压缩完成: ${toC.length}条`); return true;
    } catch(e) { console.error('压缩失败',e); return false; }
  }

  async genReport(sid) {
    const ms = await this.allMsgs(sid); if(ms.length<2) return null;
    const profile = await this.profile();
    const summary = await this.sessSummary(sid);
    const prompt = `请为以下对话生成一份回顾报告。你的任务是帮用户看见这段对话里发生了什么——不是评价这段对话"好"还是"不好"，不是给用户打分。

对话内容：
${ms.map(m=>(m.role==='user'?'用户：'+m.content:'此间：'+m.content)).join('\n')}

请返回严格JSON（不要markdown代码块）：
{

// ── API 流式调用 ──────────────────────────────────────────────
class API {
  constructor(memory) { this.memory=memory; this.ctrl=null; }
  abort() { if(this.ctrl){this.ctrl.abort();this.ctrl=null;} }
  async *stream(sid, msg, deep=false) {
    this.ctrl = new AbortController();
    const profile = await this.memory.profile();
    const summary = await this.memory.sessSummary(sid);
    const active = await this.memory.activeMsgs(sid);
    const working = active.slice(-C.workMsgs);
    const messages = [
      {role:'system',content:sysPrompt(profile,summary)},
      ...working.map(m=>({role:m.role,content:m.content})),
      {role:'user',content:msg}
    ];
    const payload = { model:deep?C.pro:C.flash, messages, stream:true, temperature:deep?0.9:1.0, max_tokens:deep?4096:2048 };
    if(deep) { payload.thinking={type:'enabled'}; payload.reasoning_effort='medium'; }

    const apiUrl = C.proxyURL || C.baseURL;
    let resp;
    try {
      resp = await fetch(apiUrl, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${C.apiKey}`},
        body:JSON.stringify(payload), signal:this.ctrl.signal
      });
    } catch(e) {
      if(e.name==='AbortError') throw e;
      if(e.message?.includes('Failed to fetch')||e.name==='TypeError')
        throw new Error('CORS_OR_NETWORK');
      throw e;
    }
    if(!resp.ok) { throw new Error(`HTTP_${resp.status}`); }

    const reader = resp.body.getReader(); const decoder = new TextDecoder(); let buf='';
    while(true) {
      const {done,value}=await reader.read(); if(done) break;
      buf+=decoder.decode(value,{stream:true}); const lines=buf.split('\n'); buf=lines.pop()||'';
      for(const l of lines) {
        if(!l.startsWith('data: ')) continue; const d=l.slice(6).trim(); if(d==='[DONE]') return;
        try {
          const p=JSON.parse(d); const dl=p.choices?.[0]?.delta; if(!dl) continue;
          if(dl.reasoning_content) yield {t:'thinking',c:dl.reasoning_content};
          if(dl.content) yield {t:'content',c:dl.content};
        } catch(e) {}
      }
    }
  }
}

  addUserMsg(text, ts=null) {

    d.innerHTML=`<div class="bubble">${this.esc(text)}</div><div class="message-meta">${ts?this.fmtTime(ts):this.now()}</div>`;

    this.hideWelcome();
    const d=document.createElement('div'); d.className='message assistant';
    d.innerHTML=`<div class="bubble">${this.esc(text)}</div><div class="message-meta">${ts?this.fmtTime(ts):this.now()}</div>`;

  createAssistantPlaceholder() {
    this.hideWelcome();
    const d=document.createElement('div'); d.className='message assistant';

    const m=document.createElement('div'); m.className='message-meta'; m.textContent='';
    d.appendChild(b); d.appendChild(m);
    this.cc.appendChild(d);
    this.curBubble=b; this.curContent=''; this.scroll(true);
  }

  appendAssistant(text) {
    if(!this.curBubble) this.createAssistantPlaceholder();
    this.curContent+=text;
    this.curBubble.textContent=this.curContent;
    this.scroll(false);
  }

  finishAssistant() {
    this.hideThinking();
    if(this.curBubble) {
      const m=this.curBubble.parentElement.querySelector('.message-meta'); if(m) m.textContent=this.now();

  renderInsights(insights, emptyEl, listEl) {
    if(!insights||insights.length===0) { emptyEl.classList.remove('hidden'); listEl.innerHTML=''; return; }
    emptyEl.classList.add('hidden');
    listEl.innerHTML = insights.map(ins => {
      const d=ins.data;

      if(d.overall) html+=`<div class="insight-body" style="font-style:italic;margin-bottom:12px">${this.esc(d.overall)}</div>`;

      if(d.strengths?.length) html+=`<div class="insight-icon"></div><div class="insight-label">你的优势</div>`+d.strengths.map(s=>`<div class="insight-title">${this.esc(s.title)}</div><div class="insight-body" style="margin-bottom:12px">${this.esc(s.body)}</div>`).join('');
      if(d.growth?.length) html+=`<div class="insight-icon"></div><div class="insight-label">成长变化</div>`+d.growth.map(g=>`<div class="insight-title">${this.esc(g.title)}</div><div class="insight-body" style="margin-bottom:12px">${this.esc(g.body)}</div>`).join('');
      if(d.suggestion) html+=`<div class="insight-icon"></div><div class="insight-label">温柔的提醒</div><div class="insight-body" style="font-style:italic">${this.esc(d.suggestion)}</div>`;
      html+=`<div class="insight-date">${new Date(ins.ts).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>`;
      html+=`</div>`;
      return html;
    }).join('');
  }

  scroll(force) {
    requestAnimationFrame(()=>{
      if(!force){const d=this.cc.scrollHeight-this.cc.scrollTop-this.cc.clientHeight;if(d>120)return;}
      this.cc.scrollTop=this.cc.scrollHeight;
    });

  esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
  now() { const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

      }
    });
    document.getElementById('topicRefresh').addEventListener('click', ()=>{
      this.ui.renderTopics(this.memory, this.sid);
    });

    // Generate insight
    document.getElementById('btnGenerateInsight').addEventListener('click', ()=>this._genInsight());

    // Sessions
    document.getElementById('btnSessions').addEventListener('click',()=>this._openSessions());
    document.getElementById('btnMenu').addEventListener('click',()=>this.modal.open('menu'));
    document.getElementById('btnCloseSessions').addEventListener('click',()=>this.modal.closeAll());
    document.getElementById('btnCloseMenu').addEventListener('click',()=>this.modal.closeAll());
    document.getElementById('btnCloseProfile').addEventListener('click',()=>this.modal.closeAll());
    document.getElementById('btnNewSession').addEventListener('click',()=>{this.modal.closeAll();this._newSession();});
    document.getElementById('menuViewProfile').addEventListener('click',()=>this._viewProfile());
    document.getElementById('menuSetApiKey').addEventListener('click',()=>this._setApiKey());
    document.getElementById('menuExport').addEventListener('click',()=>this._export());
    document.getElementById('menuImport').addEventListener('click',()=>this._import());
    document.getElementById('menuClearData').addEventListener('click',()=>this._clearAll());

    // Overlay close
    Object.values(this.modal.ovs).forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)this.modal.closeAll();}));
  }

  _setupInputResize() {
    this.ui.input.addEventListener('input',()=>{
      this.ui.input.style.height='auto';
      this.ui.input.style.height=Math.min(this.ui.input.scrollHeight,120)+'px';
    });
  }

  _setupViewport() {
    if(window.visualViewport) window.visualViewport.addEventListener('resize',()=>this.ui.scroll(false));
    this.ui.input.addEventListener('focus',()=>setTimeout(()=>this.ui.scroll(true),300));
  }

  async _backgroundCompress() {
    if(this._uncompressedCnt>C.compressThreshold) {
      const ok = await this.memory.compress(this.sid);
      if(ok) this._uncompressedCnt -= this._uncompressedCnt - C.workMsgs;
    }
  }

  async _send() {
    const text = this.ui.input.value.trim(); if(!text) return;

    // 已完成对话不能发消息
    const meta = await DB.get(this.db, 'smeta', this.sid);
    if(meta && meta.status === 'finished') {
      this.ui.toast('此对话已完成。点右上角☰开始新对话');
      return;
    }

    if(this.generating) { this.api.abort(); this.ui.hideThinking(); this.ui.finishAssistant(); this.ui.setLoading(false); this.generating=false; await new Promise(r=>setTimeout(r,100)); }

    this.generating=true;
    this.ui.input.value=''; this.ui.input.style.height='auto';
    this.ui.setLoading(true);

    this.ui.addUserMsg(text);
    this.ui.createAssistantPlaceholder();

    let full='', thinkingShown=false;
    try {
      const stream = this.api.stream(this.sid, text, this.ui.deepMode);
      for await(const c of stream) {
        if(c.t==='thinking') { if(!thinkingShown&&this.ui.deepMode){this.ui.showThinking();thinkingShown=true;} }
        else if(c.t==='content') { if(thinkingShown){this.ui.hideThinking();thinkingShown=false;} full+=c.c; this.ui.appendAssistant(c.c); }
      }
      this.ui.hideThinking(); this.ui.finishAssistant();
      if(!full){ full='（我似乎在出神…能再说一遍吗？）'; this.ui.addAssistantMsg(full); }
      await this._saveMsg('user', text);
      await this._saveMsg('assistant', full);
      await this._backgroundCompress();

      // 检查是否需要更新话题卡片
      const ms = await this.memory.allMsgs(this.sid);
      if(ms.length%10===0) this.ui.renderTopics(this.memory, this.sid);
    } catch(e) {
      this.ui.hideThinking();
      if(e.name==='AbortError') { this.ui.appendAssistant('（已停止生成）'); }
      else {
        const m=e.message||String(e);
        if(m.startsWith('CORS_OR_NETWORK')) { this.ui.appendAssistant('⚠️ 无法连接API。请确保通过HTTP服务器打开此页面（不要直接双击文件）。'); this.ui.toast('请通过HTTP服务器打开'); }
        else if(m.includes('401')) { this.ui.appendAssistant('API Key无效。请在设置中更新。'); this.ui.toast('API Key无效'); }
        else if(m.includes('429')) { this.ui.appendAssistant('⏳ 请求太频繁，请稍等。'); this.ui.toast('请求太频繁'); }
        else { this.ui.appendAssistant('抱歉，出了点问题…请稍后再试。'); this.ui.toast('连接失败'); }
      }
      this.ui.finishAssistant();
    }

    this.ui.setLoading(false); this.generating=false; this.ui.input.focus();
  }

  async _saveMsg(role, content) {
    const msg = { sid:this.sid, role, content, ts:Date.now(), compressed:false };
    await DB.put(this.db, 'msgs', msg);
    this._uncompressedCnt++;
    const meta = await DB.get(this.db, 'smeta', this.sid) || { sid:this.sid };
    meta.lastActive=Date.now(); meta.msgCount=(meta.msgCount||0)+1;
    if(!meta.createdAt) meta.createdAt=Date.now();
    await DB.put(this.db, 'smeta', meta);
  }

  // ── 搜索 ──────────────────────────────────────────────────
  _toggleSearch() {
    const bar = document.getElementById('searchBar');
    const show = bar.classList.contains('hidden');
    if (show) { bar.classList.remove('hidden'); document.getElementById('searchInput').focus(); this._doSearch(); }
    else this._closeSearch();
  }

  _closeSearch() {
    document.getElementById('searchBar').classList.add('hidden');
    this._clearHighlights();
    const s = document.getElementById('searchSummary'); if(s) s.remove();
    this.searchMatches=[]; this.searchIdx=-1; this.searchQuery='';
    this._searchTimer=null;
  }

  async _doSearch() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (q === this.searchQuery) return;
    this.searchQuery = q;
    this._clearHighlights();
    this.searchMatches = []; this.searchIdx = -1;

    if (!q || q.length < 2) {
      document.getElementById('searchCount').textContent = '';
      document.getElementById('searchPrev').disabled = true;
      document.getElementById('searchNext').disabled = true;
      return;
    }

    // 全局搜索：查 IndexedDB 所有会话
    const allMsgs = await DB.all(this.db, 'msgs');
    const allMeta = await DB.all(this.db, 'smeta');
    const matches = allMsgs.filter(m => m.content.toLowerCase().includes(q));
    const count = document.getElementById('searchCount');
    const prevBtn = document.getElementById('searchPrev');
    const nextBtn = document.getElementById('searchNext');

    if(matches.length === 0) {
      count.textContent = '无匹配';
      prevBtn.disabled = true; nextBtn.disabled = true;
      return;
    }

    count.textContent = `共 ${matches.length} 条`;
    prevBtn.disabled = false; nextBtn.disabled = false;

    // 按会话分组
    const bySession = {};
    for(const m of matches) {
      if(!bySession[m.sid]) bySession[m.sid] = [];
      bySession[m.sid].push(m);
    }

    // 显示摘要列表
    const container = document.getElementById('chatContainer');
    const oldSummary = document.getElementById('searchSummary');
    if(oldSummary) oldSummary.remove();

    const summary = document.createElement('div');
    summary.id = 'searchSummary';
    summary.style.cssText = 'padding:8px 12px;background:var(--card-bg);border-radius:12px;margin-bottom:8px;max-height:200px;overflow-y:auto;font-size:13px';
    for(const [sid, ms] of Object.entries(bySession)) {
      const meta = allMeta.find(m => m.sid === sid);
      const title = meta?.title || new Date(meta?.createdAt).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) || sid;
      const div = document.createElement('div');
      div.style.cssText = 'padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;color:var(--text-secondary)';
      div.innerHTML = `<span style="font-weight:600;color:var(--accent)">${this.ui.esc(title)}</span> · ${ms.length}条`;
      div.addEventListener('click', async () => {
        if(sid !== this.sid) {
          await this._switchSession(sid);
          // 切换后重新渲染，再从DOM高亮
          setTimeout(() => {
            this.searchQuery = q + '_rehighlight';
            this._doSearchDOM(q);
          }, 300);
        }
      });
      summary.appendChild(div);
    }
    container.insertBefore(summary, container.firstChild);

    // 在当前会话的DOM中高亮
    this._doSearchDOM(q);
  }

  _doSearchDOM(q) {
    const msgEls = document.querySelectorAll('#chatContainer .message.user, #chatContainer .message.assistant');
    let matchCount = 0;
    msgEls.forEach((el) => {
      const bubble = el.querySelector('.bubble');
      if (!bubble) return;
      const text = bubble.textContent.toLowerCase();
      if (text.includes(q)) {
        this.searchMatches.push(el);
        const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
        bubble.innerHTML = bubble.textContent.replace(regex, '<mark class="search-highlight">$1</mark>');
        matchCount++;
      }
    });
    if(matchCount > 0) this._navigateSearch(1);
  }

  _navigateSearch(dir) {
    if (this.searchMatches.length === 0) return;
    if (this.searchIdx >= 0 && this.searchIdx < this.searchMatches.length) {
      this.searchMatches[this.searchIdx].classList.remove('search-match');
    }
    this.searchIdx += dir;
    if (this.searchIdx >= this.searchMatches.length) this.searchIdx = 0;
    if (this.searchIdx < 0) this.searchIdx = this.searchMatches.length - 1;

    const el = this.searchMatches[this.searchIdx];
    el.classList.add('search-match');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });

    const count = document.getElementById('searchCount');
    count.textContent = `${this.searchIdx + 1}/${this.searchMatches.length}`;
  }

  _clearHighlights() {
    document.querySelectorAll('#chatContainer .message.search-match').forEach(el => el.classList.remove('search-match'));
    const s = document.getElementById('searchSummary'); if(s) s.remove();
    document.querySelectorAll('#chatContainer .message mark.search-highlight').forEach(m => {
      const parent = m.parentNode;
      parent.replaceChild(document.createTextNode(m.textContent), m);
      parent.normalize();
    });
    document.getElementById('searchCount').textContent = '';
    document.getElementById('searchPrev').disabled = true;
    document.getElementById('searchNext').disabled = true;
  }

  async _finishConversation() {
    if(this.generating) return;
    const ms = await this.memory.allMsgs(this.sid);
    if(ms.length<2) { this.ui.toast('再聊几句吧，现在对话内容还太少'); return; }
    this.generating=true;
    const btn = this.ui.chipSummary;
    btn.disabled=true; btn.textContent='⏳ 生成报告中…';

    const report = await this.memory.genReport(this.sid);
    if(report) {
      this.ui.addReportCard(report);
      // 锁定会话，保存AI标题
      const meta = await DB.get(this.db, 'smeta', this.sid) || {};
      meta.status = 'finished';
      if(report.title) meta.title = report.title;
      await DB.put(this.db, 'smeta', meta);
      this.ui.input.placeholder = '此对话已完成。点右上角☰开始新对话';
      this.ui.toast('对话已完成，报告已生成');
    } else {
      this.ui.toast('报告生成失败，请重试');
    }
    btn.disabled=false; btn.textContent='完成对话';
    this.generating=false;
  }

  async _autoBackup() {
    const allMsgs = await DB.all(this.db, 'msgs');
    const profile = await this.memory.profile();
    const allMeta = await DB.all(this.db, 'smeta');
    const insights = await DB.all(this.db, 'insights');
    const reports = await DB.all(this.db, 'reports');
    const encodedKey = C.apiKey ? btoa(C.apiKey) : '';
    const data = { exportedAt:new Date().toISOString(), profile, sessions:allMeta.filter(m=>m.sid!=='current'), insights, reports, messages:allMsgs, _key_encoded: encodedKey };
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`cijian_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  async _genInsight() {
    if(this.generating) return; this.generating=true;
    this.ui.toast('正在生成个性化洞察…');
    const btn = document.getElementById('btnGenerateInsight');
    btn.disabled=true; btn.textContent='⏳ 分析中…';
    const ins = await this.memory.genInsight();
    if(ins) {
      const insights = await this.memory.getInsights();
      this.ui.renderInsights(insights, document.getElementById('insightsEmpty'), document.getElementById('insightsList'));
      this.ui.toast('洞察已生成');
    } else {
      this.ui.toast('需要更多对话才能生成洞察');
    }
    btn.disabled=false; btn.textContent='生成新的洞察';
    this.generating=false;
  }

  async _newSession() {
    this.sid = this._genId();
    await DB.put(this.db, 'smeta', { sid:'current', currentSid:this.sid });
    await DB.put(this.db, 'smeta', { sid:this.sid, title:'新的对话', createdAt:Date.now(), lastActive:Date.now(), msgCount:0, summary:'', status:'active' });
    this._uncompressedCnt=0;
    this.ui.clearChat(); this.ui.showWelcome();
    this.ui.renderTopics(this.memory, this.sid);
    this.ui.switchTab('chat');
    this.ui.toast('开始新的对话');
  }

  async _switchSession(newSid) {
    if(newSid === this.sid){ this.modal.closeAll(); return; }
    this.sid = newSid;
    await DB.put(this.db, 'smeta', { sid:'current', currentSid:newSid });
    this.ui.clearChat();
    const ms = await this.memory.allMsgs(newSid);
    this._uncompressedCnt = ms.filter(m=>!m.compressed).length;
    if(ms.length>0) {
      this.ui.hideWelcome();
      for(const m of ms) {
        if(m.role==='user') this.ui.addUserMsg(m.content, m.ts);
        else if(m.role==='assistant') this.ui.addAssistantMsg(m.content, m.ts);
      }
    } else {
      this.ui.showWelcome();
      this.ui.renderTopics(this.memory, newSid);
    }
    this.modal.closeAll();
    this.ui.switchTab('chat');
    // 如果是已完成的对话，显示之前的报告
    const meta = await DB.get(this.db, 'smeta', newSid);
    if(meta && meta.status === 'finished') {
      const reports = await this.memory.getReports(newSid);
      if(reports.length > 0) {
        this.ui.addReportCard(reports[0].data);
      }
      this.ui.input.placeholder = '此对话已完成。点右上角☰开始新对话';
    } else {
      this.ui.input.placeholder = '说点什么吧...';
    }
    this.ui.toast('已切换对话');
    this.ui.scroll(true);
  }

  async _deleteSession(sid) {
    if(!confirm('确定删除这段对话？不可撤销。')) return;
    await DB.delByIdx(this.db, 'msgs', 'sid', sid);
    await DB.del(this.db, 'smeta', sid);
    if(sid===this.sid) {
      const remaining = (await DB.all(this.db, 'smeta')).filter(m => m.sid !== 'current' && m.sid !== sid);
      if(remaining.length > 0) {
        await this._switchSession(remaining[0].sid);
        this.modal.open('sessions');
        this._openSessions();
      } else {
        this.ui.clearChat();
        this.modal.closeAll();
        localStorage.clear();
        await DB.clear(this.db, 'msgs');
        await DB.clear(this.db, 'smeta');
        await DB.clear(this.db, 'profile');
        await DB.clear(this.db, 'insights');
        await DB.clear(this.db, 'reports');
        this._showSetup();
        this.ui.toast('对话已删除');
      }
      return;
    }
    this._openSessions();
    this.ui.toast('对话已删除');
  }

  async _openSessions() {
    const allMeta = await this.memory.allSessMeta();
    const sessions = allMeta.filter(m=>m.sid!=='current');
    const list = document.getElementById('sessionList');
    list.innerHTML = '';

    if(sessions.length===0) {
      list.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;font-size:14px">还没有对话记录</p>';
      this.modal.open('sessions');
      return;
    }

    const active = sessions.filter(s => s.status !== 'finished');
    const finished = sessions.filter(s => s.status === 'finished');

    const renderItem = (s) => {
      const isActive = s.sid === this.sid;
      const isFinished = s.status === 'finished';
      // 进行中：显示创建时间；已完成：显示AI标题
      const title = isFinished ? (s.title || '已完成对话') :
        (s.createdAt ? new Date(s.createdAt).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '新对话');
      const subtitle = isFinished && s.lastActive ? `完成于 ${new Date(s.lastActive).toLocaleDateString('zh-CN')}` :
        (s.lastActive ? `${new Date(s.lastActive).toLocaleDateString('zh-CN')} · ${s.msgCount||0}条` : '');
      const item = document.createElement('div');
      item.className=`session-item${isActive?' active-session':''}${isFinished?' finished-session':''}`;
      item.innerHTML=`<div class="session-info"><div class="session-title">${isFinished?'':''}${this.ui.esc(title)}</div><div class="session-date">${subtitle}</div></div><button class="session-delete" data-sid="${s.sid}">✕</button>`;
      item.addEventListener('click',e=>{if(!e.target.classList.contains('session-delete'))this._switchSession(s.sid);});
      item.querySelector('.session-delete').addEventListener('click',e=>{e.stopPropagation();this._deleteSession(s.sid);});
      list.appendChild(item);
    };

    if(active.length > 0) {
      const h = document.createElement('div');
      h.style.cssText = 'font-size:11px;color:var(--text-muted);padding:8px 16px 4px;text-transform:uppercase;letter-spacing:0.06em';
      h.textContent = '进行中';
      list.appendChild(h);
      active.forEach(renderItem);
    }

    if(finished.length > 0) {
      const h = document.createElement('div');
      h.style.cssText = 'font-size:11px;color:var(--text-muted);padding:8px 16px 4px;text-transform:uppercase;letter-spacing:0.06em;margin-top:4px';
      h.textContent = '已完成';
      list.appendChild(h);
      finished.forEach(renderItem);
    }

    this.modal.open('sessions');
  }

  async _viewProfile() {
    const profile = await this.memory.profile();
    const content = document.getElementById('profileContent');
    let html='';
    html+='<div class="profile-section"><div class="profile-label">已知信息</div>';
    html+=profile.facts?.length ? `<div class="profile-text">${profile.facts.map(f=>'• '+this.ui.esc(f)).join('<br>')}</div>` : '<div class="profile-empty">还没有记录…多聊聊吧</div>';
    html+='</div><div class="profile-section"><div class="profile-label">反复出现的主题</div>';
    html+=profile.themes?.length ? `<div class="profile-text">${profile.themes.map(t=>'• '+this.ui.esc(t)).join('<br>')}</div>` : '<div class="profile-empty">还没有发现明显的主题</div>';
    html+='</div><div class="profile-section"><div class="profile-label">重要事件</div>';
    html+=profile.events?.length ? `<div class="profile-text">${profile.events.map(e=>'• '+this.ui.esc(e)).join('<br>')}</div>` : '<div class="profile-empty">还没有记录重要事件</div>';
    html+='</div>';
    if(profile.lastUpdated) html+=`<p style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px">最后更新：${new Date(profile.lastUpdated).toLocaleString('zh-CN')}</p>`;
    content.innerHTML=html;
    this.modal.open('profile');
  }

  async _setApiKey() {
    const cur = C.apiKey; const masked = cur ? cur.slice(0,8)+'…'+cur.slice(-4) : '（未设置）';
    const curProxy = C.proxyURL || '（未使用代理）';
    const nk = prompt(`API Key：${masked}\n代理：${curProxy}\n\n输入新 Key（留空不变）：`);
    if(nk!==null&&nk.trim()){C.apiKey=nk.trim();this.ui.toast('API Key 已更新 ✓');}
    const np = prompt(`代理地址（留空不变，输入 - 清除代理）：\n当前：${curProxy}`);
    if(np!==null){ if(np.trim()==='-'){C.proxyURL='';this.ui.toast('代理已清除');} else if(np.trim()){C.proxyURL=np.trim();this.ui.toast('代理已更新');} }
    this.modal.closeAll();
  }

  async _export() {
    try {
      const allMsgs = await DB.all(this.db, 'msgs');
      const profile = await this.memory.profile();
      const allMeta = await DB.all(this.db, 'smeta');
      const insights = await DB.all(this.db, 'insights');
      const reports = await DB.all(this.db, 'reports');
      // key 用 base64 编码防明文泄露
      const encodedKey = C.apiKey ? btoa(C.apiKey) : '';
      const data = { exportedAt:new Date().toISOString(), profile, sessions:allMeta.filter(m=>m.sid!=='current'), insights, reports, messages:allMsgs, _key_encoded: encodedKey };
      const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download=`cijian_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      this.modal.closeAll(); this.ui.toast('数据已导出');
    } catch(e) { this.ui.toast('导出失败'); }
  }

  async _import() {
    // 确保数据库已打开
    if (!this.db) {
      try { this.db = await DB.open(); } catch(e) { indexedDB.deleteDatabase(C.dbName); this.db = await DB.open(); }
      this.memory = new Memory(this.db);
    }
    // 创建隐藏的文件选择器
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);

        // 验证格式
        if (!data.messages || !data.exportedAt) {
          this.ui.toast('无效的备份文件'); return;
        }

        // 解码 key
        if (data._key_encoded) {
          try { C.apiKey = atob(data._key_encoded); } catch(e) {}
        }

        if (!confirm(`即将导入：\n• ${data.messages.length} 条消息\n• ${data.insights?.length||0} 条洞察\n• ${data.reports?.length||0} 份报告\n• ${data.sessions?.length||0} 个会话\n\n会覆盖现有数据，确定继续？`)) return;

        // 清除现有数据
        await DB.clear(this.db, 'msgs');
        await DB.clear(this.db, 'profile');
        await DB.clear(this.db, 'smeta');
        await DB.clear(this.db, 'insights');
        await DB.clear(this.db, 'reports');

        // 导入消息
        if (data.messages) {
          for (const m of data.messages) {
            await DB.put(this.db, 'msgs', {
              sid: m.sid || m.sessionId, role: m.role,
              content: m.content, ts: m.ts || m.timestamp || Date.now(),
              compressed: m.compressed || false
            });
          }
        }

        // 导入档案
        if (data.profile) {
          await DB.put(this.db, 'profile', { key: 'user_profile', value: data.profile });
        }

        // 导入会话元数据
        if (data.sessions) {
          for (const s of data.sessions) {
            await DB.put(this.db, 'smeta', {
              sid: s.sid || s.sessionId, title: s.title || '',
              createdAt: s.createdAt || Date.now(), lastActive: s.lastActive || Date.now(),
              msgCount: s.msgCount || s.messageCount || 0, summary: s.summary || '',
              status: s.status || 'active'
            });
          }
        }

        // 导入洞察
        if (data.insights) {
          for (const ins of data.insights) {
            await DB.put(this.db, 'insights', { ts: ins.ts || Date.now(), data: ins.data });
          }
        }

        // 导入报告
        if (data.reports) {
          for (const r of data.reports) {
            await DB.put(this.db, 'reports', { sid: r.sid, ts: r.ts || Date.now(), data: r.data });
          }
        }

        this.ui.toast('正在恢复数据…');
        try {
          document.getElementById('overlaySetup').classList.add('hidden');
          await this._initAfterSetup();
          this.ui.toast('数据已恢复 ✅');
        } catch(initErr) {
          console.error('初始化失败', initErr);
          this.ui.toast('初始化失败，请刷新页面重试');
        }
      } catch(e) {
        console.error('导入失败', e);
        this.ui.toast('导入失败：' + (e.message || e.toString() || '文件格式错误'));
      }
    };
    input.click();
    this.modal.closeAll();
  }

  async _clearAll() {
    if(!confirm('清除所有对话和记忆？')) return;
    if(!confirm('真的要全部删除吗？不可撤销。')) return;
    try {
      await DB.clear(this.db, 'msgs'); await DB.clear(this.db, 'profile');
      await DB.clear(this.db, 'smeta'); await DB.clear(this.db, 'insights');
      await DB.clear(this.db, 'reports');
      this.sid=this._genId();
      await DB.put(this.db, 'smeta', { sid:'current', currentSid:this.sid });
      await DB.put(this.db, 'smeta', { sid:this.sid, title:'新的对话', createdAt:Date.now(), lastActive:Date.now(), msgCount:0, summary:'', status:'active' });
      this.ui.clearChat(); this.ui.showWelcome();
      this.ui.renderTopics(this.memory, this.sid);
      this.modal.closeAll(); this.ui.toast('数据已清除');
    } catch(e) { this.ui.toast('清除失败'); }
  }

  _showSetup() {
    const overlay = document.getElementById('overlaySetup');
    overlay.classList.remove('hidden');
    const firstTime = document.getElementById('setupFirstTime');
    const toggle = document.getElementById('btnSetupToggle');
    const input = document.getElementById('setupKeyInput');
    const btn = document.getElementById('btnSetupConfirm');
    const err = document.getElementById('setupError');

    // 切换首次使用表单
    toggle.addEventListener('click', () => {
      const show = firstTime.style.display === 'none';
      firstTime.style.display = show ? 'block' : 'none';
      toggle.textContent = show ? '← 返回' : '第一次使用？设置 API Key →';
      if (show) input.focus();
    });

    // 确认按钮
    btn.addEventListener('click', async () => {
      const key = input.value.trim();
      if (!key || !key.startsWith('sk-')) {
        err.textContent = '请输入有效的 API Key（以 sk- 开头）';
        err.style.display = 'block';
        return;
      }
      err.style.display = 'none';
      C.apiKey = key;
      btn.disabled = true;
      btn.textContent = '验证中…';
      try {
        await this._verifyKey();
        overlay.classList.add('hidden');
        await this._initAfterSetup();
      } catch(e) {
        err.textContent = '连接失败：' + (e.message||'请检查Key和网络');
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '开始使用';
      }
    }, { once: true });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });

    // 导入备份
    document.getElementById('btnSetupImport').addEventListener('click', () => {
      overlay.classList.add('hidden');
      this._import();
    });
  }

  async _verifyKey() {
    const url = C.proxyURL || C.baseURL;
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${C.apiKey}` },
      body: JSON.stringify({ model: C.flash, messages: [{ role: 'user', content: 'hi' }], max_tokens: 5, stream: false })
    });
    if (!resp.ok) {
      if (resp.status === 401) throw new Error('API Key 无效');
      throw new Error(`HTTP ${resp.status}`);
    }
  }

  _genId() { return 'sess_'+Date.now()+'_'+Math.random().toString(36).slice(2,8); }
}

    orientation: 'portrait',

      src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="36" fill="#b8754f"/><text x="96" y="120" font-size="90" text-anchor="middle" fill="white">—</text></svg>'),
      sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable'
    }]
  };

})();
